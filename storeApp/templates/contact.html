{% extends "base.html" %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="../static/css/contact.css">
<div class="container p-3">
        <div class="contact-wrapper">
          <div class="contact-box">
            <h4 class="text-secondary">Contact Us</h4>

            <p>Send us a message and we will get back to you.</p>

          <form method="POST" class="contact-form">
              {% csrf_token %}           
              <input
                  type="text"
                  name="name"
                  placeholder="Your Name"
                  required
              >

               <input
                  type="email"
                  name="email"
                  placeholder="Your Email"
                  required
              >

              <textarea
                  name="message"
                  rows="6"
                  placeholder="Your Message"
                  required
              ></textarea>

              <button type="submit"  id="submitBtn">Submit</button>

              <button 
                onclick="history.back()" 
                type="button"
              >
                Back
            </button>

              <h8 class="text-secondary">Via WhatsApp Contact <i class="" ></i></h8>
              <button
                type="button"
                class=" whatapp-text"
              >
                <i class="bi bi-whatsapp"></i> WhatsApp
              </button>
              
            </form>

          </div>
        </div>

        <div class="map-container mt-4">
          <iframe
            title="Abuja Map"
            src="https://www.google.com/maps?q=Tudun+Wada+Karishi+Junction,+Nasarawa,+Nigeria&output=embed"
            width="100%"
            height="350"
            style=" border: 0; border-radius: 10px; "
            allowFullScreen=""
            loading="lazy"
          ></iframe>
        </div>
      </div>
      <script src="{% static 'css/js/contact.js' %}"></script>
{% endblock content %}
