{% extends "base.html" %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/product_detail.css' %}">
<div class="container  p-3">
    <div class="row p-2">

        <!-- Product Image -->
        <div class="col-md-8 ">
            <img src="{{ product.image.url }}"
                 class=" rounded shadow  w-100 product-img"
                 alt="{{ product.name }}">
        </div>

        <!-- Product Details -->
        <div class="col-md-4 ">

            <span class="badge bg-dark mb-3">
                {{ product.category }}
            </span>

            <h1 class="fw-bold mb-2">{{ product.name }}</h1>

            <h3 class="text-secondary my-3">
                ₦{{ product.price }}
            </h3>

            <hr>

            <p>
                {{ product.description }}
            </p>

            <div class="mt-4">
                <button class="btn btn-primary btn-lg">
                    Add to Cart
                </button>

                <button onclick="history.back()" class="btn btn-outline-dark btn-lg ms-2">
                        <i class="bi bi-arrow-left-circle-fill m-1"></i>Back
                </button>
            </div>

        </div>

    </div>
</div>

{% endblock %}
