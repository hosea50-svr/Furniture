{% extends "base.html" %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/product_detail.css' %}">
<div class="container  p-3">
    <div class="row p-2">

        <!-- Product Image -->
        <div class="col-md-8 ">
            <img src="{{ product.image.url }}"
                 class=" rounded shadow  w-100 product-img"
                 alt="{{ product.name }}">
        </div>

        <!-- Product Details -->
        <div class="col-md-4 ">

            <span class="badge bg-danger mb-3 text-white mt-2">
                {{ product.category }}
            </span>

            <h1 class="fw-bold mb-2">{{ product.name }}</h1>

            <h3 class="text-secondary my-3">
               <span class="text-warning">Price:</span> ₦{{ product.price }}
            </h3>

            <hr>

            <p>
               <span class="text-primary">Material:</span> {{ product.material }}
            </p>
            <p>
                <span class="text-primary">Color:</span> {{ product.color }}
            </p>
            <p>
                <span class="text-primary">Description:</span> {{ product.description }}
            </p>

            <div class="mt-4">
                <a href="{% url 'add_to_order' product.id %}" class="btn btn-primary btn-lg">
                    Add to Order
                </a>

                <button onclick="history.back()" class="btn btn-outline-dark btn-lg ms-2">
                        <i class="bi bi-arrow-left-circle-fill m-1"></i>Back
                </button>
            </div>

        </div>

    </div>
</div>

<script>
  window.addEventListener("pageshow", function(event){
    const nav = performance.getEntriesByType("navigation")[0];

    if(event.persisted || (nav && nav.type === "back_forward")){
      location.reload()
    }
  });
</script>
{% endblock %}
