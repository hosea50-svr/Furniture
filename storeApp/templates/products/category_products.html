{% extends 'base.html' %} 
{% block content %}

<div class="container p-3">

  <div class="row">
    {% for product in products %}

    

    <div class="col-lg-3 col-md-4 mb-2">
      <div class="card h-100">
        <a href="{% url 'product_detail' product.id %}" class="text-decoration-none text-dark">
            <img
              src="{{ product.image.url }}"
              class="card-img-top"
              alt="{{ product.name }}"
              style="height: 250px; object-fit: cover;"
            />
        </a>

        <div class="card-body">
          <h5>{{ product.name }}</h5>

          <p class="fw-bold text-secondary">₦{{ product.price }}</p>

          <p  class="text-secondary">Color: {{ product.color }}</p>

          <p class="text-secondary">Material: {{ product.material }}</p>

          <a href="{% url 'add_to_order' product.id %}" class="btn btn-primary w-100">
              Add to Order
          </a>
        </div>
      </div>
    </div>

    {% empty %}

    <p>No products found.</p>

    {% endfor %}
  </div>

  <div>
      <button onclick="history.back()" class="btn btn-outline-secondary btn-lg ms-2">
              <i class="bi bi-arrow-left-circle-fill m-1"></i>Back
      </button>
    </div>
</div>

<script>
  window.addEventListener("pageshow", function(event){
    const nav = performance.getEntriesByType("navigation")[0];

    if(event.persisted || (nav && nav.type === "back_forward")){
      location.reload()
    }
  });
</script>
{% endblock content %}
